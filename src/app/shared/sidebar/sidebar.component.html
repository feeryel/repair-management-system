<div class="sidebar d-flex flex-column p-3">

  <!-- LOGO + BRAND -->
  <div class="logo-section text-center mb-4">
    <div class="logo-circle mb-2">
      <i class="bi bi-tools"></i>
    </div>
    <h4 class="title">{{ 'app.title' | translate }}</h4>
    <small class="subtitle">{{ 'sidebar.subtitle' | translate }}</small>
  </div>

  <!-- USER CHIP -->
  <div class="user-chip mb-4">
    <div class="user-av">{{ displayName.charAt(0).toUpperCase() }}</div>
    <div class="user-info">
      <span class="user-name">{{ displayName }}</span>
      <span class="user-role">{{ roleKey ? (roleKey | translate) : '' }}</span>
    </div>
  </div>

  <!-- NAV LINKS -->
  <ul class="nav flex-column flex-grow-1">
    <li class="nav-item" *ngFor="let item of navItems">
      <a [routerLink]="item.route"
         routerLinkActive="active-link"
         [routerLinkActiveOptions]="{ exact: item.route.endsWith('dashboard') }"
         class="nav-link">
        <i class="bi {{ item.icon }}"></i>
        <span>{{ item.label | translate }}</span>
      </a>
    </li>
  </ul>

  <!-- LOGOUT -->
  <div class="mt-auto pt-4">
    <div class="logout-box">
      <button class="btn logout-btn w-100" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        {{ 'navbar.logout' | translate }}
      </button>
    </div>
  </div>

</div>

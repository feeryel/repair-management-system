<nav class="navbar custom-navbar px-4 py-3">

  <div class="d-flex align-items-center gap-3">

    <div class="menu-icon">
      <i class="bi bi-tools"></i>
    </div>

    <div>

      <h5 class="mb-0 title">
TechDoctor      </h5>

      <small class="subtitle">
        Gestion intelligente des réparations
      </small>

    </div>

  </div>

  <div class="d-flex align-items-center gap-3">

    <div class="notif-wrapper">

      <button
        class="btn theme-toggle-btn notif-btn"
        type="button"
        title="Notifications"
        (click)="toggleNotifDropdown()">
        <i class="bi bi-bell-fill"></i>
        <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
      </button>

      <div class="notif-backdrop" *ngIf="showNotifDropdown" (click)="showNotifDropdown = false"></div>

      <div class="notif-dropdown" *ngIf="showNotifDropdown">

        <div class="notif-header">
          <span>Notifications</span>
          <button class="mark-all-btn" type="button" *ngIf="unreadCount > 0" (click)="markAllAsRead()">
            Tout marquer comme lu
          </button>
        </div>

        <div class="notif-list">

          <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.lu" (click)="onNotificationClick(n)">
            <div class="notif-icon">
              <i class="bi bi-bell-fill"></i>
            </div>
            <div class="notif-content">
              <div class="notif-title">{{ n.title }}</div>
              <div class="notif-message">{{ n.message }}</div>
              <div class="notif-date">{{ timeAgo(n.createdAt) }}</div>
            </div>
          </div>

          <div class="notif-empty" *ngIf="notifications.length === 0">
            <i class="bi bi-inbox"></i> Aucune notification
          </div>

        </div>

      </div>

    </div>

    <button
      class="btn theme-toggle-btn"
      type="button"
      title="Changer de thème"
      (click)="toggleTheme()">
      <i class="bi" [class.bi-moon-stars-fill]="!isDark()" [class.bi-sun-fill]="isDark()"></i>
    </button>

    <div class="admin-box">

      <div class="admin-avatar">
        <i class="bi bi-person-fill"></i>
      </div>

      <div class="admin-info">
      <span class="user-name">{{ displayName }}</span>


        <small class="admin-role">
{{roleLabel}}        </small>

      </div>

    </div>

    <button
      class="btn logout-btn"
      (click)="logout()">

      <i class="bi bi-box-arrow-right"></i>

Déconnexion
    </button>

  </div>

</nav>

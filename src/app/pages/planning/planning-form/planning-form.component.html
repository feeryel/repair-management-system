<div class="page">

  <div class="form-container">

    <!-- HEADER -->
    <div class="form-header">

      <div>
        <h2>{{ id ? 'Modifier Planning' : 'Nouveau Planning' }}</h2>
        <p>Assigner une intervention à un technicien</p>
      </div>

      <div class="header-icon"><i class="bi bi-calendar-event"></i></div>

    </div>

    <!-- FORM CARD -->
    <div class="form-card">

      <form #f="ngForm" (ngSubmit)="save(f)" novalidate>

        <!-- DESCRIPTION -->
        <div class="input-group-custom">
          <label>Description de l'intervention</label>

          <div class="input-box">
            <input type="text"
                   placeholder="Ex: Diagnostic et remplacement écran"
                   [(ngModel)]="planning.description"
                   name="description"
                   required
                   #description="ngModel">
          </div>

          <div class="error" *ngIf="description.invalid && description.touched">
            <small>Champ obligatoire</small>
          </div>
        </div>

        <!-- TECHNICIEN + DEMANDE -->
        <div class="grid-2">

          <!-- TECHNICIEN -->
          <div class="input-group-custom">
            <label>Technicien assigné</label>

            <div class="input-box">
              <select [(ngModel)]="planning.technicienId"
                      name="technicienId"
                      required
                      #technicienId="ngModel">

                <option [ngValue]="null" disabled>— Choisir un technicien —</option>

                <option *ngFor="let t of techniciens" [ngValue]="t.id">
                  {{ t.login }}
                </option>

              </select>
            </div>

            <div class="error" *ngIf="technicienId.invalid && technicienId.touched">
              <small>Veuillez choisir un technicien</small>
            </div>
          </div>

          <!-- DEMANDE -->
          <div class="input-group-custom">
            <label>Demande de réparation</label>

            <div class="input-box">
              <select [(ngModel)]="planning.DemandeReparationId"
                      name="DemandeReparationId"
                      required
                      (change)="onDemandeChange()"
                      #demandeId="ngModel">

                <option [ngValue]="null" disabled>— Choisir une demande —</option>

                <option *ngFor="let d of demandes" [ngValue]="d.id">
                  Demande #{{ d.id }} — {{ d.symptomesPanne | slice:0:40 }}
                </option>

              </select>
            </div>

            <div class="error" *ngIf="demandeId.invalid && demandeId.touched">
              <small>Veuillez choisir une demande</small>
            </div>
          </div>

        </div>

        <!-- DATES -->
        <div class="grid-2">

          <!-- DATE DEBUT -->
          <div class="input-group-custom">
            <label>Date début <small>(date de dépôt de la demande)</small></label>

            <div class="input-box">
              <input type="date"
                     [(ngModel)]="planning.dateDebut"
                     name="dateDebut"
                     required
                     readonly
                     #dateDebut="ngModel">
            </div>

            <div class="error" *ngIf="dateDebut.invalid && dateDebut.touched">
              <small>Veuillez d'abord choisir une demande</small>
            </div>
          </div>

          <!-- DATE FIN -->
          <div class="input-group-custom">
            <label>Date fin <small>(date prévue de la demande)</small></label>

            <div class="input-box">
              <input type="date"
                     [(ngModel)]="planning.dateFin"
                     name="dateFin"
                     required
                     readonly
                     #dateFin="ngModel">
            </div>

            <div class="error" *ngIf="dateFin.invalid && dateFin.touched">
              <small>Veuillez d'abord choisir une demande</small>
            </div>
          </div>

        </div>

        <!-- STATUT -->
        <div class="input-group-custom" *ngIf="id">
          <label>Statut</label>

          <div class="input-box">
            <select [(ngModel)]="planning.statut" name="statut">
              <option value="PLANIFIE">Planifié</option>
              <option value="EN_COURS">En cours</option>
              <option value="TERMINE">Terminé</option>
            </select>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="actions">

          <button type="button"
                  class="btn-cancel"
                  routerLink="/planning">
            Annuler
          </button>

          <button type="submit"
                  class="btn-save"
                  [disabled]="f.invalid || loading">

            {{ id ? 'Modifier' : 'Enregistrer' }}

          </button>

        </div>

      </form>

    </div>

  </div>

</div>

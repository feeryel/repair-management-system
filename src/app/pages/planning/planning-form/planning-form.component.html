<div class="container mt-4">

  <h2>Ajouter Planning</h2>

  <form (ngSubmit)="save()">

    <div class="mb-3">

      <label>Date début</label>

      <input
        type="date"
        class="form-control"
        [(ngModel)]="planning.dateDebut"
        name="dateDebut">

    </div>

    <div class="mb-3">

      <label>Date fin</label>

      <input
        type="date"
        class="form-control"
        [(ngModel)]="planning.dateFin"
        name="dateFin">

    </div>

    <div class="mb-3">

      <label>Responsable ID</label>

      <input
        type="number"
        class="form-control"
        [(ngModel)]="planning.responsableId"
        name="responsableId">

    </div>

    <div class="mb-3">

      <label>Demande ID</label>

      <input
        type="number"
        class="form-control"
        [(ngModel)]="planning.DemandeReparationId"
        name="DemandeReparationId">

    </div>

    <button class="btn btn-success">
      Enregistrer
    </button>

  </form>

</div>

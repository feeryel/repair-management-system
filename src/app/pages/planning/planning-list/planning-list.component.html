<div class="container mt-4">

  <h2>Liste Planning</h2>

  <a
    routerLink="/planning/add"
    class="btn btn-primary mb-3">
    Ajouter
  </a>

  <table class="table table-bordered table-striped">

    <thead class="table-dark">

      <tr>

        <th>ID</th>
        <th>Date début</th>
        <th>Date fin</th>
        <th>Responsable</th>
        <th>Demande</th>
        <th>Actions</th>

      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let p of plannings">

        <td>{{p.id}}</td>
        <td>{{p.dateDebut}}</td>
        <td>{{p.dateFin}}</td>
        <td>{{p.responsableId}}</td>
        <td>{{p.DemandeReparationId}}</td>

        <td>

          <a
            [routerLink]="['/planning/edit', p.id]"
            class="btn btn-warning btn-sm me-2">
            Modifier
          </a>

          <button
            class="btn btn-danger btn-sm"
            (click)="deletePlanning(p.id)">
            Supprimer
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>

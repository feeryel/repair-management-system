<div class="page">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>
        {{ id ? 'Modifier Appareil' : 'Ajouter Appareil' }}
      </h2>

      <p>
        Gestion intelligente des appareils Repair System
      </p>
    </div>

    <div class="header-icon">
      <i class="bi bi-cpu-fill"></i>
    </div>

  </div>

  <!-- FORM CARD -->
  <div class="form-card">

    <form (ngSubmit)="save()">

      <div class="row g-4">

        <!-- MARQUE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Marque</label>

            <div class="input-box">

              <i class="bi bi-building"></i>

              <input
                type="text"
                [(ngModel)]="appareil.marque"
                name="marque"
                placeholder="Entrer la marque">

            </div>

          </div>

        </div>

        <!-- MODELE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Modèle</label>

            <div class="input-box">

              <i class="bi bi-pc-display"></i>

              <input
                type="text"
                [(ngModel)]="appareil.modele"
                name="modele"
                placeholder="Entrer le modèle">

            </div>

          </div>

        </div>

        <!-- NUM SERIE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Numéro Série</label>

            <div class="input-box">

              <i class="bi bi-upc-scan"></i>

              <input
                type="text"
                [(ngModel)]="appareil.numSerie"
                name="numSerie"
                placeholder="Entrer le numéro série">

            </div>

          </div>

        </div>

        <!-- TYPE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Type Appareil</label>

            <div class="input-box">

              <i class="bi bi-tools"></i>

              <input
                type="text"
                [(ngModel)]="appareil.type"
                name="type"
                placeholder="Entrer le type appareil">

            </div>

          </div>

        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">

        <button type="submit" class="save-btn">

          <i class="bi bi-check-circle-fill"></i>

          {{ id ? 'Modifier Appareil' : 'Ajouter Appareil' }}

        </button>

      </div>

    </form>

  </div>

</div>

<div class="page">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>
        {{ (id ? 'appareilForm.titleEdit' : 'appareilForm.titleAdd') | translate }}
      </h2>

      <p>
        {{ 'appareilForm.subtitle' | translate }}
      </p>
    </div>

    <div class="header-icon">
      <i class="bi bi-cpu-fill"></i>
    </div>

  </div>

  <!-- FORM CARD -->
  <div class="form-card">

    <form (ngSubmit)="save()">

      <div class="row g-4">

        <!-- MARQUE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.brand' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-building"></i>

              <input
                type="text"
                [(ngModel)]="appareil.marque"
                name="marque"
                [placeholder]="'appareilForm.placeholders.brand' | translate">

            </div>

          </div>

        </div>

        <!-- MODELE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.model' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-pc-display"></i>

              <input
                type="text"
                [(ngModel)]="appareil.modele"
                name="modele"
                [placeholder]="'appareilForm.placeholders.model' | translate">

            </div>

          </div>

        </div>

        <!-- NUM SERIE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.serialNumber' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-upc-scan"></i>

              <input
                type="text"
                [(ngModel)]="appareil.numSerie"
                name="numSerie"
                [placeholder]="'appareilForm.placeholders.serialNumber' | translate">

            </div>

          </div>

        </div>

        <!-- TYPE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.deviceType' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-tools"></i>

              <select
                [(ngModel)]="typeSelect"
                name="typeSelect"
                required>

                <option value="" disabled>{{ 'appareilForm.placeholders.chooseType' | translate }}</option>

                <option *ngFor="let t of types" [value]="t">
                  {{ t }}
                </option>

              </select>

            </div>

          </div>

        </div>

        <!-- TYPE PERSONNALISE (si "Autre") -->
        <div class="col-md-6" *ngIf="typeSelect === 'Autre'">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.customType' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-pencil"></i>

              <input
                type="text"
                [(ngModel)]="customType"
                name="customType"
                [placeholder]="'appareilForm.placeholders.customType' | translate">

            </div>

          </div>

        </div>

        <!-- CLIENT PROPRIETAIRE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>{{ 'appareilForm.fields.ownerClient' | translate }}</label>

            <div class="input-box">

              <i class="bi bi-person-fill"></i>

              <select
                [(ngModel)]="appareil.clientId"
                name="clientId"
                required>

                <option [ngValue]="null" disabled>{{ 'appareilForm.placeholders.chooseClient' | translate }}</option>

                <option *ngFor="let c of clients" [ngValue]="c.id">
                  {{ c.nom }}
                </option>

              </select>

            </div>

          </div>

        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">

        <button type="submit" class="save-btn">

          <i class="bi bi-check-circle-fill"></i>

          {{ (id ? 'appareilForm.titleEdit' : 'appareilForm.titleAdd') | translate }}

        </button>

      </div>

    </form>

  </div>

</div>

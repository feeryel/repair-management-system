<div class="page">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>Centre de Réparations</h2>
      <p>Suivi technique des interventions et diagnostics</p>
    </div>

    <button   *ngIf="role === Role.RESPONSABLE_REPARATION"
 class="btn-add" [routerLink]="['/reparations/form']">
      + Nouvelle réparation
    </button>

  </div>

  <!-- SEARCH + FILTER -->
  <div class="toolbar">

    <input
      type="text"
      placeholder="🔎 Rechercher réparation..."
      [(ngModel)]="searchText"
      (ngModelChange)="currentPage = 1"
      class="search">

    <div class="filters">

      <button (click)="setFilter('all')" [class.active]="filter==='all'">
        Toutes
      </button>

      <button (click)="setFilter('PENDING')" [class.active]="filter==='PENDING'">
        PENDING
      </button>

      <button (click)="setFilter('IN_PROGRESS')" [class.active]="filter==='IN_PROGRESS'">
        IN PROGRESS
      </button>

      <button (click)="setFilter('DONE')" [class.active]="filter==='DONE'">
        DONE
      </button>

      <button (click)="setFilter('FAILED')" [class.active]="filter==='FAILED'">
        FAILED
      </button>

    </div>

  </div>

  <!-- GRID -->
  <div class="repair-grid">

    <div class="repair-card"
         *ngFor="let r of paginatedReparations">

      <div class="status-bar" [ngClass]="r.status"></div>

      <div class="card-header">

        <div class="id-box">#{{ r.id }}</div>

        <div class="status-pill" [ngClass]="r.status">
          {{ r.status }}
        </div>

      </div>

      <div class="card-body">

        <div class="title">
          {{ r.descriptionReparation }}
        </div>

        <div class="grid-info">

          <div>
            <span>📅 Fin</span>
            <strong>{{ r.dateFinRep }}</strong>
          </div>

          <div>
            <span>⏱ Temps</span>
            <strong>{{ r.tempsMainOeuvre }}h</strong>
          </div>

          <div>
            <span>🔧 Réparable</span>
            <strong>{{ r.estReparable ? 'Oui' : 'Non' }}</strong>
          </div>

          <div>
            <span>📌 Demande</span>
            <strong>#{{ r.demandeId }}</strong>
          </div>

          <div>
            <span>👨‍🔧 Tech</span>
            <strong>#{{ r.technicienId }}</strong>
          </div>

        </div>

      </div>

      <div class="card-actions" *ngIf="canChangeStatus() && r.status !== 'DONE'">
        <button class="btn-done" (click)="changeStatus(r.id, 'DONE')">
          ✓ Marquer comme terminée
        </button>
      </div>

    </div>

  </div>

  <!-- PAGINATION -->
  <div class="pagination-container" *ngIf="totalPages > 1">

    <button class="page-btn"
            (click)="changePage(currentPage - 1)"
            [disabled]="currentPage === 1">
      ‹
    </button>

    <button class="page-number"
            *ngFor="let page of [].constructor(totalPages); let i = index"
            (click)="changePage(i + 1)"
            [class.active-page]="currentPage === i + 1">

      {{ i + 1 }}

    </button>

    <button class="page-btn"
            (click)="changePage(currentPage + 1)"
            [disabled]="currentPage === totalPages">
      ›

    </button>

  </div>

</div>

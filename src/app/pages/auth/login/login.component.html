<div class="login-page">

  <div class="login-card">

    <!-- LEFT DESIGN PANEL -->
    <div class="login-left">

      <div class="icon-box">
        <i class="bi bi-tools"></i>
      </div>

      <h2>Repair System</h2>

      <p>Gestion des réparations, clients et factures</p>

    </div>

    <!-- RIGHT FORM -->
    <div class="login-right">

      <h3>Connexion</h3>

      <p class="subtitle">Accédez à votre espace</p>

      <form (ngSubmit)="login()">

        <div class="input-group">

          <label>Login</label>

          <input
            type="text"
            [(ngModel)]="loginData.login"
            name="login"
            placeholder="Entrer votre login"
            required>

        </div>

        <div class="input-group">

          <label>Mot de passe</label>

          <input
            type="password"
            [(ngModel)]="loginData.motDePasse"
            name="motDePasse"
            placeholder="••••••••"
            required>

        </div>

        <div *ngIf="errorMessage" class="error">
          {{ errorMessage }}
        </div>

        <button class="login-btn" [disabled]="loading">

          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading">Chargement...</span>

        </button>

      </form>

      <div class="footer">
        © 2026 Repair System
      </div>

    </div>

  </div>

</div>

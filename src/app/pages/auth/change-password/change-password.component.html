<div class="page">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>{{ 'changePwd.title' | translate }}</h2>
      <p>{{ 'changePwd.subtitle' | translate }}</p>
    </div>

    <div class="header-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>

  </div>

  <!-- FORM CARD -->
  <div class="form-card">

    <form (ngSubmit)="save()" #f="ngForm">

      <!-- ANCIEN MOT DE PASSE -->
      <div class="input-group-custom">

        <label>{{ 'changePwd.currentPassword' | translate }}</label>

        <div class="input-box pwd-box">

          <i class="bi bi-lock-fill"></i>

          <input
            [type]="showAncien ? 'text' : 'password'"
            [(ngModel)]="ancienMotDePasse"
            name="ancienMotDePasse"
            [placeholder]="'changePwd.currentPlaceholder' | translate"
            required>

          <button type="button" class="eye-btn" (click)="showAncien = !showAncien" tabindex="-1">
            <i class="bi" [ngClass]="showAncien ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>

        </div>

      </div>

      <!-- NOUVEAU MOT DE PASSE -->
      <div class="input-group-custom">

        <label>{{ 'changePwd.newPassword' | translate }}</label>

        <div class="input-box pwd-box">

          <i class="bi bi-key-fill"></i>

          <input
            [type]="showNouveau ? 'text' : 'password'"
            [(ngModel)]="nouveauMotDePasse"
            name="nouveauMotDePasse"
            [placeholder]="'changePwd.newPlaceholder' | translate"
            required
            minlength="6">

          <button type="button" class="eye-btn" (click)="showNouveau = !showNouveau" tabindex="-1">
            <i class="bi" [ngClass]="showNouveau ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>

        </div>

      </div>

      <!-- CONFIRMATION -->
      <div class="input-group-custom">

        <label>{{ 'changePwd.confirmPassword' | translate }}</label>

        <div class="input-box pwd-box">

          <i class="bi bi-key-fill"></i>

          <input
            [type]="showConfirmation ? 'text' : 'password'"
            [(ngModel)]="confirmationMotDePasse"
            name="confirmationMotDePasse"
            [placeholder]="'changePwd.confirmPlaceholder' | translate"
            required>

          <button type="button" class="eye-btn" (click)="showConfirmation = !showConfirmation" tabindex="-1">
            <i class="bi" [ngClass]="showConfirmation ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>

        </div>

        <div class="error" *ngIf="confirmationMotDePasse && nouveauMotDePasse !== confirmationMotDePasse">
          <small>{{ 'changePwd.mismatchInline' | translate }}</small>
        </div>

      </div>

      <!-- ACTIONS -->
      <div class="actions">

        <button type="submit" class="save-btn" [disabled]="loading">

          <i class="bi bi-check-circle-fill"></i>

          {{ loading ? ('changePwd.saving' | translate) : ('changePwd.submit' | translate) }}

        </button>

      </div>

    </form>

  </div>

</div>

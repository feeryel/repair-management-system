<div class="page">

  <!-- HEADER -->
  <div class="topbar">

    <div>
      <h1>🔧 Pièces de rechange</h1>
      <p>Gestion intelligente du stock</p>
    </div>

    <a routerLink="/pieces/add" class="add-btn">
      + Nouvelle pièce
    </a>

  </div>

  <!-- FILTERS -->
  <div class="filters">

    <input
      type="text"
      placeholder="🔍 Rechercher une pièce..."
      [(ngModel)]="searchText"
      (input)="resetPage()"
    />

    <select [(ngModel)]="filterType" (change)="resetPage()">

      <option value="ALL">Tous</option>
      <option value="OK">OK</option>
      <option value="CRITIQUE">Critiques</option>
      <option value="RUPTURE">Rupture</option>

    </select>

  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="card blue">
      📦 <span>Stock total</span>
      <h2>{{ stockTotal }}</h2>
    </div>

    <div class="card orange">
      ⚠️ <span>Critiques</span>
      <h2>{{ piecesCritiques }}</h2>
    </div>

    <div class="card green">
      ✅ <span>OK</span>
      <h2>{{ piecesOK }}</h2>
    </div>

    <div class="card red">
      ⛔ <span>Rupture</span>
      <h2>{{ ruptureStock }}</h2>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="piece-card" *ngFor="let p of paginatedPieces">

      <div class="card-header">
        <span class="id">{{ p.id }}</span>
      </div>

      <h3>{{ p.nom }}</h3>

      <p class="price">{{ p.prixHT }} DT</p>

      <div class="stock"
        [ngClass]="{
          'ok': p.quantiteEnStock > 5,
          'warn': p.quantiteEnStock <= 5 && p.quantiteEnStock > 0,
          'danger': p.quantiteEnStock === 0
        }">

        Stock: {{ p.quantiteEnStock }}

      </div>

      <div class="actions">

        <a [routerLink]="['/pieces/edit', p.id]" class="edit-btn">
          ✏️
        </a>

        <button class="delete-btn" (click)="delete(p.id)">
          🗑
        </button>

      </div>

    </div>

  </div>

  <!-- EMPTY -->
  <div class="empty" *ngIf="paginatedPieces.length === 0">
    😕 Aucune pièce trouvée
  </div>

  <!-- PAGINATION -->
  <div class="pagination-container">

    <button
      class="page-btn"
      (click)="changePage(currentPage - 1)"
      [disabled]="currentPage === 1">
      ‹
    </button>

    <button
      *ngFor="let page of [].constructor(totalPages); let i = index"
      class="page-number"
      [class.active-page]="currentPage === i + 1"
      (click)="changePage(i + 1)">
      {{ i + 1 }}
    </button>

    <button
      class="page-btn"
      (click)="changePage(currentPage + 1)"
      [disabled]="currentPage === totalPages">
      ›
    </button>

  </div>

</div>

<div class="container mt-4">

  <h2>{{ 'factureAdd.title' | translate }}</h2>

  <form (ngSubmit)="save()">

    <!-- Numéro -->
    <div class="mb-3">
      <label>{{ 'factureAdd.numero' | translate }}</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="formData.numero"
        name="numero">
    </div>

    <!-- Date -->
    <div class="mb-3">
      <label>{{ 'common.date' | translate }}</label>
      <input
        type="date"
        class="form-control"
        [(ngModel)]="formData.date"
        name="date">
    </div>

    <!-- Montant HT -->
    <div class="mb-3">
      <label>{{ 'factureAdd.montantHT' | translate }}</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="formData.montantHT"
        name="montantHT">
    </div>

    <!-- TVA -->
    <div class="mb-3">
      <label>{{ 'factureAdd.tva' | translate }}</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="formData.montantTVA"
        name="montantTVA">
    </div>

    <!-- Timbre -->
    <div class="mb-3">
      <label>{{ 'factureAdd.timbreFiscal' | translate }}</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="formData.timbreFiscale"
        name="timbreFiscale">
    </div>

    <!-- Total -->
    <div class="mb-3">
      <label>{{ 'factureAdd.montantTotal' | translate }}</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="formData.montantTotal"
        name="montantTotal">
    </div>

    <!-- Réparation -->
    <div class="mb-3">
      <label>{{ 'factureAdd.reparationId' | translate }}</label>
      <input
        type="number"
        class="form-control"
        [(ngModel)]="formData.ReparationId"
        name="ReparationId">
    </div>

    <button class="btn btn-success">
      {{ 'common.save' | translate }}
    </button>

  </form>

</div>

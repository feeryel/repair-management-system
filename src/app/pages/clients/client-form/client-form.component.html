<div class="page">

  <!-- HEADER -->
  <div class="header">

    <div>
      <h2>
        {{ id ? 'Modifier Client' : 'Ajouter Client' }}
      </h2>

      <p>
        Gestion intelligente des clients Repair System
      </p>
    </div>

    <div class="header-icon">
      <i class="bi bi-person-plus-fill"></i>
    </div>

  </div>

  <!-- FORM CARD -->
  <div class="form-card">

    <form #clientForm="ngForm" (ngSubmit)="saveClient()">

      <div class="row g-4">

        <!-- NOM -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Nom complet</label>

            <div class="input-box">

              <i class="bi bi-person-fill"></i>

              <input
                type="text"
                [(ngModel)]="client.nom"
                name="nom"
                #nom="ngModel"
                required
                minlength="3"
                placeholder="Entrer le nom">

            </div>

            <div class="error" *ngIf="nom.invalid && nom.touched">

              <small *ngIf="nom.errors?.['required']">
                Le nom est obligatoire
              </small>

              <small *ngIf="nom.errors?.['minlength']">
                Minimum 3 caractères
              </small>

            </div>

          </div>

        </div>

        <!-- TELEPHONE -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Téléphone</label>

            <div class="input-box">

              <i class="bi bi-telephone-fill"></i>

              <input
                type="text"
                [(ngModel)]="client.numTel"
                name="numTel"
                #numTel="ngModel"
                required
                pattern="^[0-9]{8}$"
                placeholder="Entrer le téléphone">

            </div>

            <div class="error" *ngIf="numTel.invalid && numTel.touched">

              <small *ngIf="numTel.errors?.['required']">
                Téléphone obligatoire
              </small>

              <small *ngIf="numTel.errors?.['pattern']">
                Numéro invalide (8 chiffres)
              </small>

            </div>

          </div>

        </div>

        <!-- EMAIL -->
        <div class="col-md-6">

          <div class="input-group-custom">

            <label>Email</label>

            <div class="input-box">

              <i class="bi bi-envelope-fill"></i>

              <input
                type="email"
                [(ngModel)]="client.email"
                name="email"
                #email="ngModel"
                required
                email
                placeholder="Entrer l'email">

            </div>

            <div class="error" *ngIf="email.invalid && email.touched">

              <small *ngIf="email.errors?.['required']">
                Email obligatoire
              </small>

              <small *ngIf="email.errors?.['email']">
                Format email invalide
              </small>

            </div>

          </div>

        </div>

        <!-- ADRESSE -->
   <!-- VILLE -->
<div class="col-md-6">

  <div class="input-group-custom">

    <label>Ville</label>

    <div class="input-box">

      <i class="bi bi-geo-alt-fill"></i>

      <select
        [(ngModel)]="client.adresse"
        name="adresse"
        #adresse="ngModel"
        required>

        <option value="" disabled selected>
          Choisir une ville
        </option>

        <option *ngFor="let ville of villes" [value]="ville">
          {{ ville }}
        </option>

      </select>

    </div>

    <div class="error" *ngIf="adresse.invalid && adresse.touched">

      <small *ngIf="adresse.errors?.['required']">
        Veuillez choisir une ville
      </small>

    </div>

  </div>

</div>
      </div>

      <!-- ACTIONS -->
      <div class="actions">

        <button
          type="submit"
          class="save-btn"
          [disabled]="clientForm.invalid">

          <i class="bi bi-check-circle-fill"></i>

          {{ id ? 'Modifier Client' : 'Ajouter Client' }}

        </button>

      </div>

    </form>

  </div>

</div>

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      Ajouter Client
    </div>

    <div class="card-body">

      <form (ngSubmit)="saveClient()">

        <div class="mb-3">

          <label>Nom</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="client.nom"
            name="nom">

        </div>

        <div class="mb-3">

          <label>Adresse</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="client.adresse"
            name="adresse">

        </div>

        <div class="mb-3">

          <label>Téléphone</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="client.numTel"
            name="numTel">

        </div>

        <div class="mb-3">

          <label>Email</label>

          <input
            type="email"
            class="form-control"
            [(ngModel)]="client.email"
            name="email">

        </div>

        <button class="btn btn-success w-100">
          Enregistrer
        </button>

      </form>

    </div>

  </div>

</div>
